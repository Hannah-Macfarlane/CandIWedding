<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Share Your Photos With Iain And Caroline</title>

  <!-- Cloudinary upload widget script -->
  <script src="https://upload-widget.cloudinary.com/global/all.js"></script>

  <style>
    body {
      font-family: Georgia, serif;
      text-align: center;
      padding: 60px 20px;
      background: #fdf8f4;
      color: #3a3a3a;
    }
    h1 { font-size: 2rem; margin-bottom: 10px; }
    p  { color: #777; margin-bottom: 40px; }

    #upload-btn {
      background: #8b6f5e;
      color: white;
      border: none;
      padding: 16px 40px;
      font-size: 1rem;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 1px;
    }
    #upload-btn:hover { background: #74594a; }

    #gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 50px;
    }
    #gallery img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    #status {
      margin-top: 20px;
      color: #8b6f5e;
      font-style: italic;
    }
  </style>
</head>
<body>

  <h1>Share Your Photos 📷</h1>
  <p>Upload your favourite moments from Caroline and Iain's big day</p>

  <button id="upload-btn">Upload Your Photos</button>
  <div id="status"></div>
  <div id="gallery"></div>

  <script src="javascript/upload.js"></script>

</body>
</html>
